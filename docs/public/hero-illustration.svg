<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Computer Screen -->
  <rect x="50" y="50" width="300" height="200" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Screen Content: Grid of Images -->
  <rect x="70" y="70" width="60" height="40" rx="4" fill="#3b82f6"/>
  <rect x="140" y="70" width="60" height="40" rx="4" fill="#10b981"/>
  <rect x="210" y="70" width="60" height="40" rx="4" fill="#f59e0b"/>
  <rect x="280" y="70" width="60" height="40" rx="4" fill="#ef4444"/>
  
  <rect x="70" y="120" width="60" height="40" rx="4" fill="#8b5cf6"/>
  <rect x="140" y="120" width="60" height="40" rx="4" fill="#06b6d4"/>
  <rect x="210" y="120" width="60" height="40" rx="4" fill="#84cc16"/>
  <rect x="280" y="120" width="60" height="40" rx="4" fill="#f97316"/>
  
  <rect x="70" y="170" width="60" height="40" rx="4" fill="#ec4899"/>
  <rect x="140" y="170" width="60" height="40" rx="4" fill="#6366f1"/>
  <rect x="210" y="170" width="60" height="40" rx="4" fill="#14b8a6"/>
  <rect x="280" y="170" width="60" height="40" rx="4" fill="#eab308"/>
  
  <!-- Eye Icon -->
  <circle cx="325" cy="150" r="25" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <circle cx="325" cy="150" r="12" fill="#374151"/>
  <circle cx="325" cy="150" r="6" fill="#ffffff"/>
  
  <!-- Hand-drawn style lines -->
  <path d="M50 50 Q40 40 50 30" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <path d="M350 50 Q360 40 350 30" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <path d="M50 250 Q40 260 50 270" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <path d="M350 250 Q360 260 350 270" stroke="#e2e8f0" stroke-width="1" fill="none"/>
